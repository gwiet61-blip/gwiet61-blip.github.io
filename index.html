<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Dosage Tracker Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            background-color: #f4f9f9;
            color: #333;
        }
        h1 { color: #2c3e50; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h1>🐟 Fish Dosage Tracker</h1>
    <p>Select a month to log or view medication dosages.</p>

    <div class="grid">
        <a href="january.html" class="btn">January</a>
        <a href="february.html" class="btn">February</a>
        <a href="march.html" class="btn">March</a>
        <a href="april.html" class="btn">April</a>
        </div>

</body>
</html>
